services:
    postgres:
        image: postgres:17-alpine
        platform: linux/amd64
        container_name: drivvn-postgres
        restart: always
        ports:
            - "6432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: drivvn
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d drivvn"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
